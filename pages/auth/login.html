<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body>

  <nav class="navbar">
    <div class="navLeft">
      <div class="logo">
        <a href="../../index.html">Cold Topic</a>
      </div>
    </div>

    <div class="navRight">
      <ul class="navLinks">
        <li><a href="../../index.html">Home</a></li>
        <li><a href="../shop/index.html">Shop</a></li>
        <li><a href="../cart/index.html">Cart</a></li>
      </ul>
            <div class="searchContainer">
        <button class="searchIcon" id="searchToggle">Search</button>
        <input type="text" class="searchBar" placeholder="Search for Product" id="searchInput">
      </div>
      <li style="list-style: none; margin-right: 20px;">
        <a href="./login.html">Sign In</a>
      </li>
      <button class="accountButton" onclick="window.location.href='signup.html'">
        Sign Up
      </button>
    </div>
  </nav>

  <!-- LOGIN SECTION -->
  <section class="authSection">
    <div class="authContainer">
      <h2>Welcome Back</h2>
      <p>Please sign in to your account</p>

      <form id="loginForm">
        <input type="text" id="loginIdentifier" placeholder="Username or Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>

        <button type="submit" class="authButton">Login</button>
      </form>

      <p class="authSwitch">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </section>
<script src="../../assets/js/script.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const identifier = document.getElementById('loginIdentifier').value;
  const password = document.getElementById('loginPassword').value;

  const result = loginUser(identifier, password);

  if (result.success) {
    alert('Login successful! Welcome back, ' + result.user.name);
    window.location.href = '../../index.html';
  } else {
    alert(result.message);
  }
});
</script>
</body>
</html>
