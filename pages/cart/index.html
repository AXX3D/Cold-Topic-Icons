<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <!-- shared styles plus any cart-specific overrides -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navLeft">
      <div class="logo">
        <a href="../../index.html">Cold Topic</a>
      </div>
    </div>

    <div class="navRight">
      <ul class="navLinks">
        <li><a href="../../index.html">Home</a></li>
        <li><a href="../shop/index.html">Shop</a></li>
        <li><a href="./index.html">Cart</a></li>
      </ul>
      <div class="searchContainer">
        <button class="searchIcon" id="searchToggle">Search</button>
        <input type="text" class="searchBar" placeholder="Search for Product" id="searchInput">
      </div>
    </div>
  </nav>

  <section class="cartSection">
    <div class="cartContainer">
      <h2>Your Cart</h2>
      <div id="cartItems"></div>
      
      <!-- Checkout Section -->
      <div id="checkoutSection" style="display: none; margin-top: 2rem; border-top: 2px solid #e0e0e0; padding-top: 2rem;">
        <h3>Checkout</h3>
        <form id="checkoutForm">
          <div class="formGroup">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required>
          </div>
          
          <div class="formGroup">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          
          <div class="formGroup">
            <label for="address">Shipping Address</label>
            <input type="text" id="address" name="address" required>
          </div>
          
          <div class="formGroup">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required>
          </div>
          
          <div class="formRow">
            <div class="formGroup" style="flex: 1; margin-right: 1rem;">
              <label for="state">State</label>
              <input type="text" id="state" name="state" required>
            </div>
            <div class="formGroup" style="flex: 1;">
              <label for="zip">ZIP Code</label>
              <input type="text" id="zip" name="zip" required>
            </div>
          </div>
          
          <div class="formGroup">
            <label>Shipping Method</label>
            <div class="shippingOptions">
              <label class="radioLabel">
                <input type="radio" name="shippingMethod" value="delivery" checked>
                Delivery
              </label>
              <label class="radioLabel">
                <input type="radio" name="shippingMethod" value="pickup">
                Pickup
              </label>
            </div>
          </div>
          
          <!-- Pickup Location Section -->
          <div id="pickupSection" style="display: none;">
            <div class="formGroup">
              <label for="pickupLocation">Pickup Location</label>
              <select id="pickupLocation" name="pickupLocation">
                <option value="">Select a location</option>
                <option value="downtown">Downtown Store</option>
                <option value="mall">Mall Location</option>
                <option value="airport">Airport Terminal</option>
              </select>
            </div>
          </div>
          
          <div class="formGroup">
            <label>Payment Method</label>
            <div class="paymentOptions">
              <label class="radioLabel">
                <input type="radio" name="paymentMethod" value="creditCard" checked>
                Credit/Debit Card
              </label>
              <label class="radioLabel">
                <input type="radio" name="paymentMethod" value="paypal">
                PayPal
              </label>
              <label class="radioLabel">
                <input type="radio" name="paymentMethod" value="applePay">
                Apple Pay
              </label>
              <label class="radioLabel">
                <input type="radio" name="paymentMethod" value="googlePay">
                Google Pay
              </label>
              <label class="radioLabel">
                <input type="radio" name="paymentMethod" value="cashOnDelivery">
                Cash on Delivery
              </label>
            </div>
          </div>
          
          <!-- Credit Card Section -->
          <div id="creditCardSection" class="paymentDetails">
            <div class="formGroup">
              <label for="cardName">Cardholder Name</label>
              <input type="text" id="cardName" name="cardName">
            </div>
            
            <div class="formGroup">
              <label for="cardNumber">Card Number</label>
              <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            
            <div class="formRow">
              <div class="formGroup" style="flex: 1; margin-right: 1rem;">
                <label for="expiry">Expiry Date</label>
                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5">
              </div>
              <div class="formGroup" style="flex: 1;">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3">
              </div>
            </div>
          </div>
          
          <button type="submit" class="checkoutButton">Complete Purchase</button>
          <button type="button" id="cancelCheckout" class="cancelButton">Cancel</button>
        </form>
      </div>
    </div>
  </section>

  <script src="../../assets/js/script.js"></script>
  <script src="../../assets/js/auth.js"></script>
</body>
</html>
